<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ravenof</title>
  <style>
    html,body{margin:0;height:100%;background:#0A0A0F;color:#e8e8f0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      display:flex;align-items:center;justify-content:center;text-align:center}
    .wrap{display:flex;flex-direction:column;align-items:center;gap:18px;padding:24px}
    .logo{font-size:30px;font-weight:800;letter-spacing:.18em;
      background:linear-gradient(90deg,#b388ff,#7c4dff);-webkit-background-clip:text;
      background-clip:text;color:transparent}
    .ring{width:42px;height:42px;border-radius:50%;
      border:3px solid rgba(124,77,255,.25);border-top-color:#7c4dff;
      animation:spin 1s linear infinite}
    .msg{font-size:13px;opacity:.6}
    .retry{display:none;margin-top:8px;padding:10px 20px;border:1px solid #7c4dff;
      border-radius:10px;background:transparent;color:#b388ff;font-size:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">RAVENOF</div>
    <div class="ring" id="ring"></div>
    <div class="msg" id="msg">Kraunama…</div>
    <button class="retry" id="retry" onclick="location.reload()">Bandyti dar kartą</button>
  </div>
  <script>
    // Šis ekranas matomas tik kol kraunasi serveris arba kai nėra interneto.
    setTimeout(function(){
      if(!navigator.onLine){
        document.getElementById('ring').style.display='none';
        document.getElementById('msg').textContent='Nėra interneto ryšio';
        document.getElementById('retry').style.display='inline-block';
      }
    }, 4000);
  </script>
</body>
</html>
